services:
  # Основной Go-бэкенд
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"                # хост:контейнер
    environment:
      - SERVER_PORT=8080
      - DATABASE_URL=postgresql://user:password@db:5432/mydb?sslmode=disable
      - JWT_SECRET=your_strong_jwt_secret_here
    volumes:
      - ./backend/uploads:/root/uploads  # сохраняем загрузки между перезапусками
    depends_on:
      - db
      - ml-service
    restart: unless-stopped

  # PostgreSQL (если используется)
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ML-сервис (ваш Python-контейнер)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    # НЕ публикуем порт — только внутреннее взаимодействие
    restart: unless-stopped

volumes:
  postgres_data: